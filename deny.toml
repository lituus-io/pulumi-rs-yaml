[advisories]
# Transitive dependencies of the starlark crate (by Meta) that are
# flagged as unmaintained. These are upstream issues in starlark v0.13;
# ignore until starlark migrates to alternatives.
ignore = [
    "RUSTSEC-2024-0388", # derivative - unmaintained
    "RUSTSEC-2025-0057", # fxhash - unmaintained
    "RUSTSEC-2024-0436", # paste - unmaintained
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "AGPL-3.0-or-later",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
